name: Rebuild on Sanity Publish

on:
  repository_dispatch:
    types: [sanity-publish]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          PUBLIC_SANITY_PROJECT_ID: tmsmtg2i
          PUBLIC_SANITY_DATASET: production

      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 1535b43a4d1b9feb649cf95a716a4471
